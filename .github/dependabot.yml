version: 2
updates:
  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - frontend
    groups:
      react:
        patterns:
          - react*
          - react-dom*
      vite:
        patterns:
          - vite*
          - '@vitejs/*'
      testing:
        patterns:
          - vitest*
          - '@testing-library/*'

  - package-ecosystem: npm
    directory: /backend
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - backend
    groups:
      express:
        patterns:
          - express*
          - helmet
          - cors
      mongoose:
        patterns:
          - mongoose*
          - mongodb*

  - package-ecosystem: pip
    directory: /python-ai-service
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - python

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    labels:
      - dependencies
      - ci
