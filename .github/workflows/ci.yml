name: CI Pipeline

on:
  push:
    branches: [master, 'feat/**', 'fix/**', 'refactor/**', 'docs/**']
  pull_request:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-backend:
    name: Lint Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - name: Run ESLint
        run: npx eslint src/ --ext .js --max-warnings 30
        continue-on-error: true

  lint-frontend:
    name: Lint Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - name: Run ESLint
        run: npx eslint src/ --ext .js,.jsx --max-warnings 30
        continue-on-error: true

  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - name: Run tests
        run: npm test
        env:
          NODE_ENV: test
          UPLOAD_DIR: test_uploads

  test-frontend:
    name: Test Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - name: Run tests
        run: npx vitest run --reporter=verbose
        env:
          NODE_ENV: test

  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - name: Build
        run: npm run build
        env:
          VITE_API_URL: http://localhost:3000/api

  quality-summary:
    name: Quality Summary
    needs: [lint-backend, lint-frontend, test-backend, test-frontend, build-frontend]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - run: |
          echo '## Quality Gate Results' >> $GITHUB_STEP_SUMMARY
          echo '- Lint Backend: ${{ needs.lint-backend.result }}' >> $GITHUB_STEP_SUMMARY
          echo '- Lint Frontend: ${{ needs.lint-frontend.result }}' >> $GITHUB_STEP_SUMMARY
          echo '- Test Backend: ${{ needs.test-backend.result }}' >> $GITHUB_STEP_SUMMARY
          echo '- Test Frontend: ${{ needs.test-frontend.result }}' >> $GITHUB_STEP_SUMMARY
          echo '- Build Frontend: ${{ needs.build-frontend.result }}' >> $GITHUB_STEP_SUMMARY
