<!doctype html>
<html lang="en">
  <head>
    <script>
      (function() {
        var theme = localStorage.getItem('theme');
        if (theme === 'dark' || (!theme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
          document.documentElement.setAttribute('data-theme', 'dark');
        } else {
          document.documentElement.setAttribute('data-theme', 'light');
        }
      })();
    </script>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5" />
    <meta name="theme-color" content="#2563eb" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="SnapPass AI" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="SnapPass AI" />
    <meta
      name="description"
      content="SnapPass AI — Open-source AI-powered passport photo studio. Background removal, face centering, and A4 print sheet generation."
    />
    <meta property="og:title" content="SnapPass AI — Passport Photo Studio" />
    <meta
      property="og:description"
      content="Upload your photo and get a print-ready passport photo sheet in seconds."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://snappass-ai.vercel.app" />
    <link rel="icon" href="/logo.svg" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/icons/icon-192x192.png" />
    <meta name="msapplication-TileColor" content="#2563eb" />
    <meta name="msapplication-TileImage" content="/icons/icon-192x192.png" />
    <title>SnapPass AI — Passport Photo Studio</title>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run SnapPass AI.</noscript>
    <div id="root"></div>
    <script type="module" src="/src/index.jsx"></script>
  </body>
</html>
